# 使用 GitHub Pages 原生捆绑的 minima（当前为 2.5.1），无需 remote_theme
theme: minima

title: 自我疗愈
description: 程序员医学笔记
lang: zh-CN

# 顶部导航显示的页面
header_pages:
  - about.md

# minima 2.5.1 footer 社交链接（扁平写法）
github_username: cloudsmithy

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# 分页：每页文章数（文章多了才会分页）
paginate: 5
paginate_path: "/page:num/"

# README.md 仅用于 GitHub 仓库首页，不参与站点构建
exclude:
  - README.md
